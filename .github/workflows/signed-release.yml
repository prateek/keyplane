name: Signed Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_stapling:
        description: "Skip notarization stapling while Apple notarization is being configured"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  signed-macos-release:
    name: Signed macOS release
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      SKIP_STAPLING: ${{ github.event.inputs.skip_stapling || 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate signing secrets
        shell: bash
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing signing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple signing certificate
        shell: bash
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security find-identity -v -p codesigning build.keychain

          identity="$(
            security find-identity -v -p codesigning build.keychain \
              | sed -n 's/.*"\(.*\)".*/\1/p' \
              | grep -E 'Developer ID Application|Apple Distribution|Apple Development' \
              | head -n 1
          )"
          if [ -z "$identity" ]; then
            echo "No Apple code-signing identity found in imported certificate" >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Build signed macOS release
        shell: bash
        run: |
          args=(--bundles "app,dmg" --ci)
          if [ "$SKIP_STAPLING" = "true" ]; then
            args+=(--skip-stapling)
          fi
          npm run tauri build -- "${args[@]}"

      - name: Upload signed macOS app bundle
        uses: actions/upload-artifact@v6
        with:
          name: keyplane-macos-signed-app
          path: src-tauri/target/release/bundle/macos/Keyplane.app
          if-no-files-found: error

      - name: Upload signed macOS dmg
        uses: actions/upload-artifact@v6
        with:
          name: keyplane-macos-signed-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Clean up signing keychain
        if: ${{ always() }}
        shell: bash
        run: |
          rm -f certificate.p12
          security delete-keychain build.keychain || true
