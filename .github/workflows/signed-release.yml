name: Signed Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_stapling:
        description: "Skip notarization stapling while Apple notarization is being configured"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  signed-macos-release:
    name: Signed macOS release
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      SKIP_STAPLING: ${{ github.event.inputs.skip_stapling || 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate signing secrets
        shell: bash
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing signing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple signing certificate
        shell: bash
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security find-identity -v -p codesigning build.keychain

          identity="$(
            security find-identity -v -p codesigning build.keychain \
              | sed -n 's/.*"\(.*\)".*/\1/p' \
              | grep -E 'Developer ID Application|Apple Distribution|Apple Development' \
              | head -n 1
          )"
          if [ -z "$identity" ]; then
            echo "No Apple code-signing identity found in imported certificate" >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Build signed macOS release
        shell: bash
        run: |
          args=(--bundles "app,dmg" --ci)
          if [ "$SKIP_STAPLING" = "true" ]; then
            args+=(--skip-stapling)
          fi
          npm run tauri build -- "${args[@]}"

      - name: Verify signed macOS artifacts
        shell: bash
        run: |
          set -euo pipefail

          validation_dir="target/keyplane-validation"
          report_path="$validation_dir/signed-artifacts.md"
          app_path="src-tauri/target/release/bundle/macos/Keyplane.app"
          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' -print -quit)"

          if [ ! -d "$app_path" ]; then
            echo "Missing app bundle: $app_path" >&2
            exit 1
          fi

          if [ -z "$dmg_path" ] || [ ! -f "$dmg_path" ]; then
            echo "Missing dmg artifact under src-tauri/target/release/bundle/dmg" >&2
            exit 1
          fi

          mkdir -p "$validation_dir"
          {
            printf '# Signed macOS Artifact Verification\n\n'
            printf -- '- App bundle: %s\n' "$app_path"
            printf -- '- DMG: %s\n' "$dmg_path"
            printf -- '- Skip stapling: %s\n\n' "$SKIP_STAPLING"

            printf '## App Bundle Codesign Verify\n\n```text\n'
            codesign --verify --deep --strict --verbose=2 "$app_path"
            printf '```\n\n'

            printf '## App Bundle Codesign Details\n\n```text\n'
            codesign -dv --verbose=4 "$app_path"
            printf '```\n\n'

            if [ "$SKIP_STAPLING" = "true" ]; then
              printf '## Gatekeeper Assessment\n\n'
              printf 'Skipped because skip_stapling=true was selected for this run.\n\n'
            else
              printf '## Gatekeeper Assessment\n\n```text\n'
              spctl --assess --type execute --verbose=4 "$app_path"
              printf '```\n\n'
            fi

            printf '## DMG Integrity\n\n```text\n'
            hdiutil verify "$dmg_path"
            printf '```\n\n'

            printf '## DMG SHA-256\n\n```text\n'
            shasum -a 256 "$dmg_path"
            printf '```\n'
          } > "$report_path" 2>&1

      - name: Upload signed macOS app bundle
        uses: actions/upload-artifact@v6
        with:
          name: keyplane-macos-signed-app
          path: src-tauri/target/release/bundle/macos/Keyplane.app
          if-no-files-found: error

      - name: Upload signed macOS dmg
        uses: actions/upload-artifact@v6
        with:
          name: keyplane-macos-signed-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload signed release verification report
        uses: actions/upload-artifact@v6
        with:
          name: keyplane-macos-release-evidence
          path: target/keyplane-validation/signed-artifacts.md
          if-no-files-found: error

      - name: Clean up signing keychain
        if: ${{ always() }}
        shell: bash
        run: |
          rm -f certificate.p12
          security delete-keychain build.keychain || true
